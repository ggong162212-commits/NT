<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#A8E6CF" />
<title>🌴 나트랑 여행 — 7월 4일 (토)</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    /* 파스텔 트로피컬 팔레트 */
    --cream:#FFFBF5;
    --cream-2:#FFF4E9;
    --ink:#4F4A5E;
    --ink-soft:#8A85A0;
    --line:#EFE7DC;

    --coral-bg:#FFE3D8; --coral-tx:#D06A4F; --coral-dot:#FF9C82;
    --purple-bg:#ECDEFB; --purple-tx:#8C5FC4; --purple-dot:#C2A0EE;
    --mint-bg:#CFF2E3;  --mint-tx:#2F9A75;  --mint-dot:#79D7B2;
    --sky-bg:#D6ECFB;   --sky-tx:#3C84B8;   --sky-dot:#8CC9EE;
    --yellow-bg:#FFF0C6; --yellow-tx:#C0901E; --yellow-dot:#FFD667;
    --gray-bg:#EAE9F0;  --gray-tx:#6E6B7C;  --gray-dot:#B7B5C4;
    --peach-bg:#FFE8D2; --peach-tx:#C57E3A; --peach-dot:#FFBE85;
    --lav-bg:#E7E3F6;   --lav-tx:#7A71AD;   --lav-dot:#B7AEE2;

    --warn:#E8536B;
    --warn-bg:#FFE2E7;

    --radius:22px;
    --shadow:0 8px 24px rgba(140,120,160,.12);
    --shadow-sm:0 4px 12px rgba(140,120,160,.10);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,
      "Apple SD Gothic Neo","Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 60% at 100% 0%, #DFF6EC 0%, transparent 55%),
      radial-gradient(120% 50% at 0% 0%, #E3F1FF 0%, transparent 50%),
      var(--cream);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto;padding:0 16px 40px;}

  /* ───────── 헤더 ───────── */
  .hero{
    position:relative;
    margin:14px 0 22px;
    padding:26px 22px 24px;
    border-radius:28px;
    background:linear-gradient(135deg,#C6F0DD 0%,#CFE9FB 48%,#FFD9CC 100%);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .hero::after{
    content:"🌴";position:absolute;right:-6px;bottom:-14px;
    font-size:96px;opacity:.22;transform:rotate(-8deg);
  }
  .hero .kicker{
    display:inline-block;font-size:12px;font-weight:800;letter-spacing:.04em;
    color:#2C6E63;background:rgba(255,255,255,.75);
    padding:5px 12px;border-radius:999px;backdrop-filter:blur(2px);
  }
  .hero h1{
    margin:12px 0 4px;font-size:27px;font-weight:800;letter-spacing:-.02em;
    color:#3E5A5E;
  }
  .hero h1 .em{color:#E07A5F;}
  .hero .sub{margin:0;font-size:14px;font-weight:600;color:#5E6E70;}
  .hero .sub b{color:#2F9A75;}
  .hero .who{
    margin:8px 0 0;display:inline-block;font-size:13px;font-weight:700;color:#3E5A5E;
    background:rgba(255,255,255,.75);padding:5px 12px;border-radius:999px;backdrop-filter:blur(2px);
  }

  /* ───────── 호텔 정보 토글 ───────── */
  .hotel-toggle{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;margin:0 0 4px;padding:14px 18px;border:none;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:800;color:#3E5A5E;
    background:#fff;border-radius:18px;box-shadow:var(--shadow-sm);
  }
  .hotel-toggle .arrow{font-size:13px;color:var(--ink-soft);transition:transform .25s ease;}
  .hotel-toggle[aria-expanded="true"] .arrow{transform:rotate(180deg);}

  .hotel-panel{
    overflow:hidden;max-height:0;opacity:0;
    transition:max-height .35s ease,opacity .25s ease,margin .25s ease;
  }
  .hotel-panel.open{max-height:1200px;opacity:1;margin-top:8px;}
  .hotel-panel + .hotel-toggle{margin-top:12px;}
  #tipsPanel.open{max-height:2400px;}
  #resort.open{max-height:2800px;}
  .tip-card{
    background:#fff;border-radius:var(--radius);padding:14px 16px;
    box-shadow:var(--shadow-sm);margin-bottom:10px;border-left:6px solid var(--ac,#FF9C82);
  }
  .tip-card h3{margin:0 0 8px;font-size:15px;font-weight:800;letter-spacing:-.01em;}
  .tip-card ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px;}
  .tip-card li{
    font-size:13px;font-weight:600;color:#5E586E;line-height:1.5;
    padding-left:16px;position:relative;
  }
  .tip-card li::before{content:"·";position:absolute;left:4px;top:-1px;font-weight:800;color:var(--ac,#FF9C82);}
  .tip-card li b{color:var(--warn);font-weight:800;}
  .hotel-card{
    background:#fff;border-radius:var(--radius);padding:15px 16px;
    box-shadow:var(--shadow-sm);margin-bottom:10px;border-left:6px solid var(--ac,#A8E6CF);
  }
  .hotel-card .tag{
    display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;
    background:var(--tagbg);color:var(--tagtx);margin-bottom:7px;
  }
  .hotel-card h3{margin:0 0 6px;font-size:16px;font-weight:800;letter-spacing:-.01em;}
  .hotel-card .info{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
  .hotel-card .info span{font-size:13px;font-weight:600;color:#6B6577;}

  /* ───────── 섹션 타이틀 ───────── */
  .sec-title{
    display:flex;align-items:center;gap:8px;
    margin:30px 4px 14px;font-size:18px;font-weight:800;letter-spacing:-.01em;
  }
  .sec-title small{font-size:12px;font-weight:600;color:var(--ink-soft);}

  /* ───────── 타임라인 ───────── */
  .timeline{position:relative;padding-left:30px;}
  .timeline::before{
    content:"";position:absolute;left:9px;top:8px;bottom:8px;width:3px;
    border-radius:3px;
    background:linear-gradient(#A8E6CF,#AEE0F5 45%,#FFB5A7);
  }
  .ev{position:relative;margin-bottom:14px;}
  .dot{
    position:absolute;left:-30px;top:18px;width:18px;height:18px;border-radius:50%;
    background:#fff;border:4px solid var(--d,#B7B5C4);
    box-shadow:0 0 0 4px var(--cream);z-index:2;
  }
  .ev.now .dot{
    border-color:var(--coral-dot);
    box-shadow:0 0 0 4px var(--cream),0 0 0 8px rgba(255,156,130,.35);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 4px var(--cream),0 0 0 7px rgba(255,156,130,.30);}
    50%{box-shadow:0 0 0 4px var(--cream),0 0 0 13px rgba(255,156,130,0);}
  }

  .card{
    background:#fff;border-radius:var(--radius);padding:14px 16px;
    box-shadow:var(--shadow-sm);border:1.5px solid #fff;
  }
  .ev.now .card{border-color:var(--coral-dot);box-shadow:0 8px 22px rgba(255,156,130,.22);}

  .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .time{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
  .nowtag{
    font-size:10.5px;font-weight:800;color:#fff;background:var(--coral-dot);
    padding:2px 8px;border-radius:999px;
  }
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;
    background:var(--bg);color:var(--tx);
  }
  .title{margin:8px 0 0;font-size:16px;font-weight:700;letter-spacing:-.01em;}

  /* 일정 체크 + 접기 */
  .ev-check{
    margin-left:auto;flex:0 0 26px;width:26px;height:26px;border-radius:9px;
    border:2.5px solid #DCD6CB;background:#fff;color:#fff;cursor:pointer;
    font-size:14px;font-weight:800;line-height:1;display:flex;
    align-items:center;justify-content:center;transition:all .15s ease;padding:0;
  }
  .ev-check:active{transform:scale(.9);}
  .ev-body{
    overflow:hidden;max-height:600px;opacity:1;
    transition:max-height .3s ease,opacity .2s ease,margin .2s ease;
  }
  .ev.collapsed .card{background:#FBFAF7;border-color:#EEF6F1;}
  .ev.collapsed .ev-check{background:#3FB68A;border-color:#3FB68A;}
  .ev.collapsed .dot{border-color:#9BDCC0 !important;}
  .ev.collapsed .title{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:rgba(138,133,160,.5);}
  .ev.collapsed .ev-body{max-height:0;opacity:0;margin-top:-8px;}
  .ev.collapsed.now .card{border-color:var(--coral-dot);}

  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .pill{
    font-size:12px;font-weight:600;color:var(--ink-soft);
    background:var(--cream-2);padding:4px 10px;border-radius:999px;
  }
  .memo{
    margin-top:9px;font-size:13px;font-weight:600;color:#6B6577;
    background:var(--cream-2);border-radius:14px;padding:8px 11px;
  }
  .memo.warn{color:var(--warn);background:var(--warn-bg);font-weight:700;}
  .memo .ic{margin-right:3px;}

  .maps{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;}
  .map-btn{
    display:inline-flex;align-items:center;gap:5px;
    font-size:13px;font-weight:800;text-decoration:none;color:#2F9A75;
    background:var(--mint-bg);padding:8px 14px;border-radius:999px;
    transition:transform .12s ease;
  }
  .map-btn:active{transform:scale(.95);}
  .map-btn.alt{color:#3C84B8;background:var(--sky-bg);}

  /* ───────── 리조트 섹션 ───────── */
  .res-card{
    background:#fff;border-radius:var(--radius);padding:15px 16px;
    box-shadow:var(--shadow-sm);margin-bottom:12px;border-left:6px solid var(--ac,#A8E6CF);
  }
  .res-card h3{margin:0 0 4px;font-size:15px;font-weight:800;}
  .res-card .note{margin:0 0 10px;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{
    font-size:12.5px;font-weight:700;padding:6px 11px;border-radius:13px;
    background:var(--cream-2);color:#5E586E;
  }
  .chip.warn{background:var(--warn-bg);color:var(--warn);}
  .chip b{color:#2F9A75;}

  /* ───────── 체크리스트 ───────── */
  .check{
    display:flex;align-items:flex-start;gap:12px;
    background:#fff;border-radius:18px;padding:13px 15px;margin-bottom:9px;
    box-shadow:var(--shadow-sm);cursor:pointer;user-select:none;
    transition:background .15s ease;
  }
  .box{
    flex:0 0 24px;width:24px;height:24px;border-radius:8px;margin-top:1px;
    border:2.5px solid #D9D3C8;background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;color:#fff;transition:all .15s ease;
  }
  .check .lab{font-size:14.5px;font-weight:600;letter-spacing:-.01em;}
  .check.done{background:var(--mint-bg);}
  .check.done .box{background:#3FB68A;border-color:#3FB68A;}
  .check.done .lab{color:#2F9A75;text-decoration:line-through;text-decoration-color:rgba(47,154,117,.5);}
  .check.removing{
    background:var(--mint-bg);
    animation:checkout-anim .32s ease forwards;
  }
  .check.removing .box{background:#3FB68A;border-color:#3FB68A;}
  @keyframes checkout-anim{
    0%{opacity:1;}
    40%{opacity:1;transform:scale(1.02);}
    100%{opacity:0;transform:translateX(40px) scale(.9);max-height:0;margin:0;padding-top:0;padding-bottom:0;}
  }
  .check-done-all{
    text-align:center;font-size:15px;font-weight:800;color:#2F9A75;
    background:var(--mint-bg);border-radius:18px;padding:18px;
  }

  /* ───────── 푸터 ───────── */
  .footer{text-align:center;margin-top:34px;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .footer .big{font-size:22px;}

  /* ───────── 지금으로 ───────── */
  .jump{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    z-index:50;display:none;align-items:center;gap:6px;
    font-size:13.5px;font-weight:800;color:#fff;text-decoration:none;
    background:var(--coral-dot);padding:11px 18px;border-radius:999px;
    box-shadow:0 8px 20px rgba(255,120,90,.4);cursor:pointer;border:none;
  }
  .jump.show{display:inline-flex;animation:pop .3s ease;}
  @keyframes pop{from{transform:translateX(-50%) scale(.8);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <span class="kicker">DAY 1 · NHA TRANG → CAM RANH</span>
    <h1>🌴 나트랑 <span class="em">여행일정</span></h1>
    <p class="sub">7월 4일 <b>(토)</b></p>
    <p class="who">👭 참석자 · 선고은 · 고지은</p>
  </header>

  <button class="hotel-toggle" id="hotelToggle" aria-expanded="false">
    <span>🏨 호텔 정보</span><span class="arrow">▾</span>
  </button>
  <div class="hotel-panel" id="hotelPanel"></div>

  <button class="hotel-toggle" id="resortToggle" aria-expanded="false">
    <span>🏝️ 아나만다라 정보</span><span class="arrow">▾</span>
  </button>
  <div class="hotel-panel" id="resort"></div>

  <button class="hotel-toggle" id="tipsToggle" aria-expanded="false">
    <span>⚠️ 여행 주의사항</span><span class="arrow">▾</span>
  </button>
  <div class="hotel-panel" id="tipsPanel"></div>

  <h2 class="sec-title">🗓️ 오늘 일정 <small>위에서 아래로</small></h2>
  <div class="timeline" id="timeline"></div>

  <footer class="footer">
    <div class="big">🌅🏝️🐚</div>
    오늘도 좋은 하루 되세요!<br>여행 잘 다녀와요 ✨
  </footer>

</div>

<button class="jump" id="jump">⏰ 지금 일정으로</button>

<script>
/* ───────── 호텔 정보 ───────── */
const HOTELS = [
  {role:"오늘 퇴실 (낮 시간 짐 보관)", roleC:"yellow", ac:"#FFD667",
   name:"레스참 호텔 (Le Cham)",
   info:["📍 나트랑 시내","🧳 11:00 퇴실 후 짐 맡겼다가 15:20쯤 회수","🍜 반미·네일·마사지 다 도보권"],
   maps:[{l:"지도 열기",u:"https://maps.app.goo.gl/vJoJSuwcgtXahy4C9"}]},
  {role:"오늘 체크인 (1박)", roleC:"sky", ac:"#8CC9EE",
   name:"아나만다라 깜란 리조트",
   info:["📍 깜란 (시내서 약 30km · 그랩 30–40분)","🕓 16:20 체크인 예정","🥐 조식 포함","🏖️ 프라이빗 비치 + 수영장"],
   maps:[{l:"지도 열기",u:"https://www.google.com/maps/search/Ana+Mandara+Cam+Ranh+Resort"}]},
];
const hp = document.getElementById("hotelPanel");
HOTELS.forEach(h=>{
  const maps = h.maps.map(m=>`<a class="map-btn" href="${m.u}" target="_blank" rel="noopener">📍 ${m.l}</a>`).join("");
  const card = document.createElement("div");
  card.className = "hotel-card";
  card.style.setProperty("--ac", h.ac);
  card.style.setProperty("--tagbg", `var(--${h.roleC}-bg)`);
  card.style.setProperty("--tagtx", `var(--${h.roleC}-tx)`);
  card.innerHTML = `<span class="tag">${h.role}</span>
    <h3>${h.name}</h3>
    <div class="info">${h.info.map(x=>`<span>${x}</span>`).join("")}</div>
    <div class="maps">${maps}</div>`;
  hp.appendChild(card);
});
const ht = document.getElementById("hotelToggle");
ht.addEventListener("click", ()=>{
  const open = hp.classList.toggle("open");
  ht.setAttribute("aria-expanded", open ? "true" : "false");
});

/* ───────── 여행 주의사항 ───────── */
const TIPS = [
  {h:"💧 물 · 음식 위생", ac:"#8CC9EE", items:[
    "수돗물은 마시지 말고, 양치도 가급적 생수로",
    "음료는 <b>“노 아이스(No Ice)”</b> · 병/캔 생수 위주로",
    "반미·길거리 음식은 사람 많은 깨끗한 곳에서",
    "배탈·소화제 등 상비약 챙기기"]},
  {h:"🚕 택시 · 그랩", ac:"#FFD667", items:[
    "이동은 <b>그랩(Grab) 앱</b> 호출 권장",
    "앱에 뜬 차량번호와 실제 차가 같은지 꼭 확인",
    "호객 택시 · '미터기 없이 정가 흥정'은 바가지 위험",
    "기사가 잔돈 안 거슬러주는 경우 → 앱 카드결제가 편함",
    "깜란 공항 ↔ 시내 차로 약 40분"]},
  {h:"💵 환전 · 현금", ac:"#79D7B2", items:[
    "동(VND)은 0이 많아 <b>0 개수 항상 확인</b>",
    "환전 직후 그 자리에서 한 장씩 세기 (밑장 빼기 주의)",
    "시장·노점은 현금만 가능 · 소액권 넉넉히",
    "신뢰할 수 있는 은행/한인 환전소 이용"]},
  {h:"👜 소지품 · 소매치기", ac:"#FF9C82", items:[
    "야시장·해변·붐비는 곳에서 소매치기 주의",
    "가방은 앞으로 메기 (도로 반대쪽 어깨)",
    "폰을 손에 들고 걷지 말기 (오토바이 날치기)",
    "해변에 귀중품 두고 자리 비우지 않기"]},
  {h:"☀️ 햇빛 · 해변 안전", ac:"#C2A0EE", items:[
    "낮 12~15시 자외선 매우 강함 → 선크림 수시로",
    "화상 진정용 알로에젤 있으면 유용",
    "프라이빗 비치 18시 · 수영장 20시 마감 (오늘 일정 참고)",
    "파도·이안류 주의, 안전요원 구역에서 수영"]},
  {h:"👗 복장 · 매너", ac:"#FFBE85", items:[
    "사원 방문 시 어깨·무릎 가리는 복장",
    "리조트 밖에서는 과한 노출 자제",
    "공공장소 과도한 스킨십·왼손으로 물건 건네기 자제"]},
  {h:"🚭 입국 규정 (중요)", ac:"#E8536B", items:[
    "<b>전자담배(액상·가열식 전부) 반입·소지·사용 전면 금지</b>",
    "적발 시 큰 벌금·징역 가능 → 절대 가져가지 않기"]},
  {h:"🆘 비상 연락", ac:"#B7AEE2", items:[
    "경찰 <b>113</b> · 소방 <b>114</b> · 구급 <b>115</b>",
    "여권 사본을 따로 보관 (분실 대비)",
    "여행자보험 증서·긴급연락처 메모해두기"]},
];
const tp = document.getElementById("tipsPanel");
TIPS.forEach(t=>{
  const card = document.createElement("div");
  card.className = "tip-card";
  card.style.setProperty("--ac", t.ac);
  card.innerHTML = `<h3>${t.h}</h3><ul>${t.items.map(x=>`<li>${x}</li>`).join("")}</ul>`;
  tp.appendChild(card);
});
const tt = document.getElementById("tipsToggle");
tt.addEventListener("click", ()=>{

/* ───────── 타임라인 렌더 ───────── */
const toMin = t => {const[h,m]=t.split(":").map(Number);return h*60+m;};
const tl = document.getElementById("timeline");

let tlDone = {};
try{ tlDone = JSON.parse(localStorage.getItem("ntr_0704_tl")||"{}"); }catch(e){ tlDone = {}; }

PLAN.forEach((p,i)=>{
  const cat = CAT[p.cat];
  const emoji = p.emoji || cat.emoji;
  const label = p.label || cat.label;
  const c = cat.c;

  const maps = (p.maps||[]).map(m =>
    `<a class="map-btn ${m.alt?'alt':''}" href="${m.u}" target="_blank" rel="noopener">📍 ${m.l}</a>`
  ).join("");

  const ev = document.createElement("div");
  ev.className = "ev" + (tlDone[i] ? " collapsed" : "");
  ev.dataset.start = toMin(p.start);
  ev.style.setProperty("--d", `var(--${c}-dot)`);
  ev.innerHTML = `
    <span class="dot"></span>
    <div class="card">
      <div class="row1">
        <span class="time">${p.time}</span>
        <span class="badge" style="--bg:var(--${c}-bg);--tx:var(--${c}-tx)">${emoji} ${label}</span>
        <span class="nowtag" style="display:none">NOW</span>
        <button class="ev-check" aria-label="완료 표시">✓</button>
      </div>
      <p class="title">${p.title}</p>
      <div class="ev-body">
        <div class="meta">${p.move?`<span class="pill">${p.move}</span>`:""}</div>
        ${p.memo?`<div class="memo ${p.warn?'warn':''}">${p.warn?'<span class="ic">⚠️</span>':'<span class="ic">📌</span>'}${p.memo}</div>`:""}
        ${maps?`<div class="maps">${maps}</div>`:""}
      </div>
    </div>`;
  ev.querySelector(".ev-check").addEventListener("click", (e)=>{
    e.stopPropagation();
    const done = ev.classList.toggle("collapsed");
    tlDone[i] = done;
    try{ localStorage.setItem("ntr_0704_tl", JSON.stringify(tlDone)); }catch(err){}
  });
  tl.appendChild(ev);
});

/* ───────── 현재 진행중 표시 ───────── */
const jump = document.getElementById("jump");
let nowEl = null;
function markNow(){
  const now = new Date();
  const cur = now.getHours()*60 + now.getMinutes();
  const evs = [...document.querySelectorAll(".ev")];
  let target = null;
  for(let i=0;i<evs.length;i++){
    const s = +evs[i].dataset.start;
    const next = i+1<evs.length ? +evs[i+1].dataset.start : 24*60;
    if(cur>=s && cur<next){ target = evs[i]; break; }
  }
  evs.forEach(e=>{
    e.classList.remove("now");
    const tag = e.querySelector(".nowtag"); if(tag) tag.style.display="none";
  });
  if(target){
    target.classList.add("now");
    const tag = target.querySelector(".nowtag"); if(tag) tag.style.display="inline-block";
    nowEl = target;
    jump.classList.add("show");
  } else {
    nowEl = null;
    jump.classList.remove("show");
  }
}
jump.addEventListener("click", ()=>{
  if(nowEl) nowEl.scrollIntoView({behavior:"smooth", block:"center"});
});
markNow();
setInterval(markNow, 60000);
